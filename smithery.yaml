# Smithery configuration for SaaSQuickStart MCP server
# https://smithery.ai/docs/build

runtime: go
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      saasquickstartUrl:
        type: string
        description: "Base URL of your SaaSQuickStart instance (e.g., https://your-app.fly.dev)"
      apiKey:
        type: string
        description: "Root-tenant API key with admin authority (starts with lsk_)"
    required:
      - saasquickstartUrl
      - apiKey
  commandFunction: |
    (config) => ({
      command: "./saasquickstart",
      args: ["mcp"],
      env: {
        LASTSAAS_URL: config.saasquickstartUrl,
        LASTSAAS_API_KEY: config.apiKey
      }
    })
