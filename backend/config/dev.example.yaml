server:
  host: ${SERVER_HOST:localhost}
  port: ${SERVER_PORT:4290}

database:
  uri: ${MONGODB_URI}
  name: ${DATABASE_NAME}

frontend:
  url: ${FRONTEND_URL:http://localhost:4280}

jwt:
  access_secret: ${JWT_ACCESS_SECRET}
  refresh_secret: ${JWT_REFRESH_SECRET}
  access_ttl_minutes: 60
  refresh_ttl_days: 30

oauth:
  google_client_id: ${GOOGLE_CLIENT_ID}
  google_client_secret: ${GOOGLE_CLIENT_SECRET}
  google_redirect_url: ${GOOGLE_REDIRECT_URL}

email:
  resend_api_key: ${RESEND_API_KEY}
  from_email: ${FROM_EMAIL:noreply@yourdomain.com}
  from_name: ${FROM_NAME:LastSaaS}

app:
  name: ${APP_NAME:LastSaaS}

stripe:
  secret_key: ${STRIPE_SECRET_KEY}
  publishable_key: ${STRIPE_PUBLISHABLE_KEY}
  webhook_secret: ${STRIPE_WEBHOOK_SECRET}

webhooks:
  encryption_key: ${WEBHOOK_ENCRYPTION_KEY}

datadog:
  api_key: ${DATADOG_API_KEY}
  site: ${DATADOG_SITE:us5.datadoghq.com}
  hostname: ${DATADOG_HOSTNAME}

# Object storage for uploaded files (logos, media, post images).
# Omit provider or set to "db" to store files in MongoDB (local dev default).
# For production, use "r2" (Cloudflare R2) or "s3" (AWS S3).
objectstore:
  provider: ${OBJECTSTORE_PROVIDER:db}
  access_key: ${OBJECTSTORE_ACCESS_KEY}
  secret_key: ${OBJECTSTORE_SECRET_KEY}
  bucket: ${OBJECTSTORE_BUCKET}
  public_url: ${OBJECTSTORE_PUBLIC_URL}
  # R2 only: your Cloudflare account ID
  account_id: ${OBJECTSTORE_ACCOUNT_ID}
  # S3 only: AWS region (e.g. "us-east-1")
  region: ${OBJECTSTORE_REGION}
