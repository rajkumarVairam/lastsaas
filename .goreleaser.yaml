version: 2

project_name: saasquickstart

before:
  hooks:
    - cd backend && go mod tidy

builds:
  - id: saasquickstart
    dir: backend
    main: ./cmd/saasquickstart
    binary: saasquickstart
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: saasquickstart
    formats:
      - tar.gz
    ids:
      - saasquickstart
    name_template: "saasquickstart_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: jonradoff
    name: saasquickstart
  draft: false
  prerelease: auto
